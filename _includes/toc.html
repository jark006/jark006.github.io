<!-- TOC (Table of Contents) -->
{% if include.content contains '<h2' or include.content contains '<h3' %}
<!-- Mobile TOC toggle button -->
<button class="mobile-toc-toggle" x-data @click="tocOpen = !tocOpen">
  <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="8" y1="6" x2="21" y2="6"/>
    <line x1="8" y1="12" x2="21" y2="12"/>
    <line x1="8" y1="18" x2="21" y2="18"/>
    <line x1="3" y1="6" x2="3.01" y2="6"/>
    <line x1="3" y1="12" x2="3.01" y2="12"/>
    <line x1="3" y1="18" x2="3.01" y2="18"/>
  </svg>
  目录
</button>

<!-- Mobile TOC dropdown -->
<div class="mobile-toc" x-data="{ tocOpen: false }" :class="tocOpen ? 'open' : ''">
  <!-- Generated by JS -->
</div>

<!-- Desktop sidebar TOC (left side) -->
<nav class="toc-sidebar" data-toc aria-label="文章目录">
  <div class="toc-title">目录</div>
  <!-- Generated by JS -->
</nav>
{% endif %}
