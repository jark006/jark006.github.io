# Site
title: JARK006的博客
description:
url: "https://jark006.github.io"
baseurl: ""
author: JARK006
lang: zh-CN

# Table of Contents
toc: true

# Build
markdown: kramdown
highlighter: rouge
permalink: /:title/
sass:
  style: :compressed

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1
  toc_levels: 2..3
  auto_ids: true
  input: GFM

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - CLAUDE.md
  - AGENTS.md
